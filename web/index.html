<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herman AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
            --text: #e0e0e0; --text2: #888; --accent: #6c5ce7;
            --accent2: #a29bfe; --green: #00b894; --red: #e74c3c;
            --border: #333; --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { background: var(--bg2); padding: 40px; border-radius: var(--radius); width: 400px; border: 1px solid var(--border); }
        .auth-box h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .auth-box p { text-align: center; color: var(--text2); margin-bottom: 24px; font-size: 14px; }
        .auth-box input { width: 100%; padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; transition: border 0.2s; }
        .auth-box input:focus { border-color: var(--accent); }
        .auth-box button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .auth-box button:hover { opacity: 0.9; }
        .auth-box .toggle { text-align: center; margin-top: 16px; color: var(--text2); font-size: 13px; }
        .auth-box .toggle a { color: var(--accent2); cursor: pointer; text-decoration: none; }
        .auth-error { color: var(--red); font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }

        /* App Layout */
        .app { display: none; height: 100vh; }
        .app.active { display: flex; }
        .sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 16px; }
        .sidebar-header button { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
        .sidebar-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; font-size: 13px; color: var(--text2); transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-item:hover { background: var(--bg3); color: var(--text); }
        .sidebar-item.active { background: var(--accent); color: white; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-footer a { color: var(--accent2); cursor: pointer; text-decoration: none; }

        /* Chat */
        .chat { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text2); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .msg.assistant { align-self: flex-start; background: var(--bg3); border-bottom-left-radius: 4px; }
        .msg.assistant table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; background: var(--bg2); border-radius: 8px; overflow: hidden; }
        .msg.assistant th { background: var(--accent); color: white; padding: 8px 12px; text-align: left; font-weight: 600; border: none; }
        .msg.assistant td { padding: 8px 12px; border-top: 1px solid var(--border); border-left: none; border-right: none; border-bottom: none; }
        .msg.assistant tr:hover td { background: var(--bg3); }
        .msg.assistant code { background: var(--bg2); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .msg.assistant pre { background: var(--bg2); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .msg.assistant pre code { background: none; padding: 0; }
        .msg.assistant h2, .msg.assistant h3 { margin: 12px 0 6px; }
        .msg.assistant strong { color: var(--accent2); }
        .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 6px 0; }
        .typing { display: flex; gap: 4px; padding: 12px 16px; }
        .typing span { width: 8px; height: 8px; background: var(--text2); border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

        .chat-input { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input textarea { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; color: var(--text); font-size: 14px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; line-height: 1.4; }
        .chat-input textarea:focus { border-color: var(--accent); }
        .chat-input button { background: var(--accent); border: none; color: white; padding: 0 20px; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
        .chat-input button:hover { opacity: 0.9; }
        .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

        .empty-state { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text2); }
        .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 14px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<!-- Auth -->
<div class="auth-container" id="authScreen">
    <div class="auth-box">
        <h1>Herman AI</h1>
        <p>AI Operating System</p>
        <div class="auth-error" id="authError"></div>
        <input type="text" id="authName" placeholder="Username" style="display:none">
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPass" placeholder="Password">
        <button id="authBtn" onclick="doAuth()">Login</button>
        <div class="toggle">Belum punya akun? <a onclick="toggleAuth()">Register</a></div>
    </div>
</div>

<!-- App -->
<div class="app" id="appScreen">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Herman AI</h2>
            <button onclick="newChat()">+ Chat</button>
        </div>
        <div class="sidebar-list" id="convList"></div>
        <div class="sidebar-footer">
            <span id="userEmail"></span>
            <a onclick="logout()">Logout</a>
        </div>
    </div>
    <div class="chat">
        <div class="chat-header" id="chatHeader">Pilih atau mulai chat baru</div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <h2>Herman AI</h2>
                <p>Mulai percakapan baru atau pilih dari sidebar</p>
            </div>
        </div>
        <div class="chat-input">
            <textarea id="chatInput" placeholder="Ketik pesan..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
            <button id="sendBtn" onclick="sendMsg()">Kirim</button>
        </div>
    </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('token');
let isRegister = false;
let conversations = [];
let currentConv = null;

// Auto resize textarea
document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function toggleAuth() {
    isRegister = !isRegister;
    document.getElementById('authName').style.display = isRegister ? 'block' : 'none';
    document.getElementById('authBtn').textContent = isRegister ? 'Register' : 'Login';
    document.querySelector('.toggle').innerHTML = isRegister
        ? 'Sudah punya akun? <a onclick="toggleAuth()">Login</a>'
        : 'Belum punya akun? <a onclick="toggleAuth()">Register</a>';
    document.getElementById('authError').style.display = 'none';
}

async function doAuth() {
    const email = document.getElementById('authEmail').value;
    const pass = document.getElementById('authPass').value;
    const name = document.getElementById('authName').value;
    const errEl = document.getElementById('authError');

    if (!email || !pass) { errEl.textContent = 'Isi semua field'; errEl.style.display = 'block'; return; }

    const endpoint = isRegister ? '/api/v1/auth/register' : '/api/v1/auth/login';
    const body = isRegister
        ? { email, password: pass, username: name || email.split('@')[0] }
        : { email, password: pass };

    try {
        const res = await fetch(API + endpoint, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.detail || 'Error'; errEl.style.display = 'block'; return; }

        if (isRegister) {
            errEl.textContent = 'Register berhasil, silakan login';
            errEl.style.color = 'var(--green)';
            errEl.style.display = 'block';
            toggleAuth();
            return;
        }
        token = data.access_token;
        localStorage.setItem('token', token);
        localStorage.setItem('userEmail', email);
        showApp();
    } catch (e) {
        errEl.textContent = 'Koneksi gagal'; errEl.style.display = 'block';
    }
}

function logout() {
    token = null;
    localStorage.removeItem('token');
    localStorage.removeItem('userEmail');
    document.getElementById('appScreen').classList.remove('active');
    document.getElementById('authScreen').style.display = 'flex';
}

async function showApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('active');
    document.getElementById('userEmail').textContent = localStorage.getItem('userEmail') || '';
    await loadConversations();
}

async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) }
    });
    if (res.status === 401) { logout(); return null; }
    return res.json();
}

async function loadConversations() {
    const data = await apiFetch('/api/v1/chat/conversations');
    if (!data) return;
    conversations = data.conversations || [];
    renderConvList();
}

function renderConvList() {
    const el = document.getElementById('convList');
    el.innerHTML = conversations.map(c =>
        `<div class="sidebar-item ${currentConv?.id === c.id ? 'active' : ''}" onclick="openConv('${c.id}')">${c.title || 'Untitled'}</div>`
    ).join('');
}

function newChat() {
    currentConv = null;
    document.getElementById('chatHeader').textContent = 'Chat Baru';
    document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><h2>Herman AI</h2><p>Ketik pesan untuk memulai</p></div>';
    renderConvList();
}

async function openConv(id) {
    currentConv = conversations.find(c => c.id === id);
    if (!currentConv) return;
    document.getElementById('chatHeader').textContent = currentConv.title || 'Chat';
    renderConvList();

    const data = await apiFetch(`/api/v1/chat/conversations/${id}`);
    if (!data) return;

    const msgs = data.messages || [];
    const el = document.getElementById('chatMessages');
    el.innerHTML = '';
    msgs.forEach(m => addMsgEl(m.role, m.content));
    el.scrollTop = el.scrollHeight;
}

function addMsgEl(role, content) {
    const el = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = renderMd(content);
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
    return div;
}

function renderMd(text) {
    if (!text) return '';
    // First handle code blocks
    let html = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');

    // Handle tables - split by double newline to find table blocks
    const lines = html.split('\n');
    let inTable = false;
    let tableLines = [];
    let result = [];

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('|') && line.endsWith('|')) {
            if (!inTable) inTable = true;
            tableLines.push(line);
        } else {
            if (inTable && tableLines.length > 0) {
                result.push(renderTable(tableLines));
                tableLines = [];
                inTable = false;
            }
            result.push(line);
        }
    }
    if (tableLines.length > 0) result.push(renderTable(tableLines));

    let final = result.join('\n')
        .replace(/^- (.+)$/gm, '• $1')
        .replace(/\n/g, '<br>');

    // Clean up <br> inside tables
    final = final.replace(/<table>([\s\S]*?)<\/table>/g, (m) => m.replace(/<br>/g, ''));
    return final;
}

function renderTable(lines) {
    if (lines.length < 2) return lines.join('<br>');

    // Find separator row
    let headerIdx = 0;
    let sepIdx = -1;
    for (let i = 0; i < lines.length; i++) {
        const cells = lines[i].split('|').filter(c => c.trim());
        if (cells.every(c => c.trim().match(/^[-:]+$/))) {
            sepIdx = i;
            break;
        }
    }

    const parseCells = (line) => line.split('|').filter((c, i, arr) => i > 0 && i < arr.length - 1).map(c => c.trim());

    let html = '<table>';
    if (sepIdx > 0) {
        // Has header
        const headers = parseCells(lines[0]);
        html += '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
        html += '<tbody>';
        for (let i = sepIdx + 1; i < lines.length; i++) {
            const cells = parseCells(lines[i]);
            html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        }
        html += '</tbody>';
    } else {
        // No header, treat all as data
        html += '<tbody>';
        for (const line of lines) {
            const cells = parseCells(line);
            html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        }
        html += '</tbody>';
    }
    html += '</table>';
    return html;
}

async function sendMsg() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMsgEl('user', text);

    const typingEl = document.createElement('div');
    typingEl.className = 'msg assistant';
    typingEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    document.getElementById('chatMessages').appendChild(typingEl);
    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;

    try {
        const body = { content: text, stream: false };
        if (currentConv) body.conversation_id = currentConv.id;

        const data = await fetch(API + '/api/v1/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(body)
        }).then(r => r.json());

        typingEl.remove();

        if (data.message) {
            addMsgEl('assistant', data.message.content);
            if (data.conversation_id && !currentConv) {
                currentConv = { id: data.conversation_id, title: text.substring(0, 50) };
                await loadConversations();
                document.getElementById('chatHeader').textContent = currentConv.title;
            }
        } else if (data.detail) {
            addMsgEl('assistant', 'Error: ' + data.detail);
        }
    } catch (e) {
        typingEl.remove();
        addMsgEl('assistant', 'Koneksi gagal: ' + e.message);
    }
    document.getElementById('sendBtn').disabled = false;
}

// Init
if (token) showApp();
</script>
</body>
</html>
